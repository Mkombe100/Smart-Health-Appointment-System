<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login and Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-shell">
    <section class="brand-panel" aria-label="Welcome">
      <div>
        <h1>DPA SYSTEM</h1>
        <p>Create an account or sign in to manage appointments, doctors, and patient information.</p>
      </div>
      <div class="brand-badges" aria-label="Account features">
      </div>
    </section>

    <section class="form-panel">
      <div class="tabs" role="tablist" aria-label="Authentication forms">
        <button class="tab-button active" type="button" role="tab" aria-selected="true" data-form="login">Login</button>
        <button class="tab-button" type="button" role="tab" aria-selected="false" data-form="signup">Sign Up</button>
      </div>

      <h2 class="form-title" id="formTitle">Welcome back</h2>
      <p class="form-subtitle" id="formSubtitle">Login with your email and password.</p>

      <form id="loginForm" class="active" autocomplete="on">
        <div id="loginMessage" class="message" role="status" aria-live="polite"></div>
        <div class="field">
          <label for="loginEmail">Email address</label>
          <input id="loginEmail" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="submit-button" type="submit">Login</button>
      </form>

      <form id="signupForm" autocomplete="on">
        <div id="signupMessage" class="message" role="status" aria-live="polite"></div>
        <div class="field">
          <label for="fullName">Full name</label>
          <input id="fullName" name="full_name" type="text" autocomplete="name" minlength="2" required>
        </div>
        <div class="field">
          <label for="signupEmail">Email address</label>
          <input id="signupEmail" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="two-columns">
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel">
          </div>
          <div class="field">
            <label for="role">Account type</label>
            <select id="role" name="role" required>
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="two-columns">
          <div class="field">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" name="password" type="password" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
          </div>
        </div>
        <button class="submit-button" type="submit">Create account</button>
      </form>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab-button");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const formTitle = document.getElementById("formTitle");
    const formSubtitle = document.getElementById("formSubtitle");

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message show ${type}`;
    }

    function clearMessage(element) {
      element.textContent = "";
      element.className = "message";
    }

    function setLoading(form, isLoading) {
      const button = form.querySelector(".submit-button");
      button.disabled = isLoading;
      button.dataset.originalText = button.dataset.originalText || button.textContent;
      button.textContent = isLoading ? "Please wait..." : button.dataset.originalText;
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.form;
        tabs.forEach((item) => {
          const active = item === tab;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", String(active));
        });

        loginForm.classList.toggle("active", target === "login");
        signupForm.classList.toggle("active", target === "signup");
        formTitle.textContent = target === "login" ? "Welcome back" : "Create your account";
        formSubtitle.textContent = target === "login"
          ? "Login with your email and password."
          : "Register your details to start using the system.";
      });
    });

    async function submitAjax(form, url, messageElement) {
      clearMessage(messageElement);
      setLoading(form, true);

      try {
        const response = await fetch(url, {
          method: "POST",
          body: new FormData(form)
        });
        const result = await response.json();
        showMessage(messageElement, result.message || "Request completed.", result.success ? "success" : "error");

        if (result.success) {
          form.reset();
        }
      } catch (error) {
        showMessage(messageElement, "Something went wrong. Please try again.", "error");
      } finally {
        setLoading(form, false);
      }
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitAjax(loginForm, "login.php", document.getElementById("loginMessage"));
    });

    signupForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitAjax(signupForm, "signup.php", document.getElementById("signupMessage"));
    });
  </script>
</body>
</html>
